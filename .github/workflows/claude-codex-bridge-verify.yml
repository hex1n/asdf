name: claude-codex-bridge verify

# Visible CI for the claude-codex-bridge plugin: runs its self-contained
# verification gate (manifest checks, byte-identical companion copies, and the
# Node test suite) on every push and pull request that touches the subtree.
on:
  push:
    paths:
      - "claude-codex-bridge/**"
      - ".github/workflows/claude-codex-bridge-verify.yml"
  pull_request:
    paths:
      - "claude-codex-bridge/**"
      - ".github/workflows/claude-codex-bridge-verify.yml"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # verify.sh requires Node.js 18.18+; 20 is the current LTS.
          node-version: "20"
      # python3 (used by the manifest validation step) ships with ubuntu-latest.
      - name: Run verify.sh
        working-directory: claude-codex-bridge
        run: sh scripts/verify.sh
