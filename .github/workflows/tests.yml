name: tests

on:
  push:
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Bridge tests: bridge.ts integration (stub codex/claude) + markdown
      # shell contracts + packaging checks.
      - run: python -m unittest tests.test_bridge_contracts -v
      # java-stack-craft helper-script suite.
      - run: python -m unittest discover -s tests -q
        working-directory: skills/java-stack-craft
      # TODO: add tests.test_skill_e2e_contracts once its stale
      # git-resume-miner scenarios are resolved (skill was deleted in ce32840).
